  - assets/css/games/coral.css
  - assets/css/games/mistria.css
  - assets/css/games/sandrock.css
  - assets/css/games/sunhaven.css

extra:
  analytics:
    provider: google
    property: G-NENYIKVWHL
  generator: false
  consent:
    title: Notice
    description: >-
      This site uses cookies for analytics and contains affiliate links.
      <a href="/privacy-policy/">Privacy Policy</a> |
      <a href="/affiliate-disclosure/">Affiliate Disclosure</a>

copyright: >-
  Farming Games Help &copy; 2026 |
  <a href="/privacy-policy/">Privacy Policy</a> |
  <a href="/affiliate-disclosure/">Affiliate Disclosure</a> |
  As an Amazon Associate and Steam Partner, we earn from qualifying purchases.

plugins:
  - search
  - macros:
      module_name: hooks/main

