site_name: 种田游戏攻略
site_url: https://farminggames.help
site_description: 种田/农场/模拟经营游戏攻略数据库 - Stardew Valley, Farming Simulator, 牧场物语等
site_author: farming-games

theme:
  name: material
  language: zh
  palette:
    - scheme: slate
      primary: green
      accent: lime
      toggle:
        icon: material/lightbulb
        name: 切换到亮色模式
    - scheme: default
      primary: green
      accent: lime
      toggle:
        icon: material/lightbulb-outline
        name: 切换到深色模式
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.path
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
    - header.autohide

plugins:
  - search
  - git-revision-date-localized:
      enabled: true
      type: timeago
  - minify:
      minify_html: true
      minify_js: true
      minify_css: true
      cache_safe: true
  - glightbox

extra_javascript:
  - assets/js/utterances.js
  - assets/js/game-bg.js

extra_css:
  - assets/css/custom.css

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
  - admonition
  - pymdownx.details
  - tables
  - attr_list
  - md_in_html

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/
  generator: false

copyright: Copyright &copy; 2026 种田游戏攻略

nav:
  - 🏠 首页: index.md
  - 🌾 种田游戏数据库:
    - 游戏列表: database/games.md
  - 🌟 星露谷物语:
    - 🌱 全季节作物利润表: stardev/crops.md
    - 🐟 鱼类图鉴与价格: stardev/fish.md
    - 💝 NPC礼物好感表: stardev/npc-gifts.md
    - 🧑‍🍳 工匠制品利润对比: stardev/artisan.md
    - 🌷 春季完整攻略: stardev/spring-guide.md
    - ☀️🍁❄️ 夏秋冬攻略: stardev/seasons.md
    - 📚 完整图鉴: stardev/encyclopedia.md
    - 📬 反馈建议: stardev/feedback.md
  - 🚜 模拟农场25:
    - 完整攻略: farmingsim/index.md
    - 🆕 新手起步指南: farmingsim/getting-started.md
    - 🌽 作物利润全表: farmingsim/crops.md
    - 🚜 农机选购指南: farmingsim/machinery.md
    - 📬 反馈建议: farmingsim/feedback.md
  - 🏹 Palia帕利亚:
    - 完整攻略: palia/index.md
    - 🆕 新手完整攻略: palia/guide.md
    - 📬 反馈建议: palia/feedback.md
  - 📖 新手入门指南:
    - 新手攻略: guides/newbie.md
    - 总览: guides/index.md
  - 📰 更新日志: news/index.md
  - ℹ️ 关于本站: about.md
