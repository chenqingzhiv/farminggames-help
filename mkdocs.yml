site_name: Farming Games Help
site_url: https://farminggames.help
theme:
  name: material
  custom_dir: overrides
  features:
    - navigation.sections
    - navigation.top
    - toc.integrate
    - search.highlight
    - search.suggest

extra_css:
  - assets/css/custom.css
  - assets/css/games/stardew.css
