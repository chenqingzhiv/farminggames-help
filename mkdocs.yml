site_name: Farming Games Help
site_url: https://farminggames.help
site_description: Complete guides & databases for cozy farming games - Stardew Valley, Farming Simulator, Palia, and more
site_author: farming-games

theme:
  name: material
  language: en
  custom_dir: overrides
  palette:
    - scheme: slate
      primary: green
      accent: lime
      toggle:
        icon: material/lightbulb
        name: Switch to light mode
    - scheme: default
      primary: green
      accent: lime
      toggle:
        icon: material/lightbulb-outline
        name: Switch to dark mode
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.path
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
    - header.autohide

plugins:
  - search
  - blog:
      enabled: true
      blog_dir: news
      post_dir: "{blog}/posts"
      post_url_format: "{slug}"
      blog_toc: false
  - git-revision-date-localized:
      enabled: true
      type: timeago
  - minify:
      minify_html: true
      minify_js: true
      minify_css: true
      cache_safe: true
  - glightbox
  - advanced-seo:
      enabled: true
      add_schema_org_json_ld: true
      use_open_graph: true
      use_twitter_cards: true
      og_image: assets/img/og-image.png
  - macros:
      module_name: hooks/main
  - awesome-pages:
      collapse_single_pages: true
      strict: false
  - redirects:
      redirect_maps: {}

extra_javascript:
  - assets/js/utterances.js
  - assets/js/game-bg.js
  - assets/vendor/jquery.min.js
  - assets/vendor/datatables.js
  - assets/js/datatables-init.js
  - assets/js/tools/stardew-profit-planner.js
  - assets/js/tools/stardew-npc-optimizer.js
  - assets/js/tools/stardew-fish-tracker.js
  - assets/js/tools/community-center.js
  - assets/js/tools/mining-tracker.js
  - assets/js/tools/crop-compare.js

extra_css:
  - assets/css/custom.css
  - assets/vendor/datatables.css

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
  - admonition
  - pymdownx.details
  - tables
  - attr_list
  - md_in_html

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/
  generator: false

copyright: Copyright &copy; 2026 Farming Games Help

